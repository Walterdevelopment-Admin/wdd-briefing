<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>施工進度表 · Progress Schedule (Gantt)</title>
<style>
  :root{ --bg:#f3f5f7; --panel:#fff; --line:#d7dde3; --line2:#eef1f4; --ink:#1c2530; --muted:#6b7684; --head:#3c4a5a; --accent:#2e75b6; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:"Microsoft JhengHei","Noto Sans TC","Segoe UI",system-ui,sans-serif;font-size:13px;}
  button,input,select{font-family:inherit;font-size:13px;color:var(--ink);}
  .wrap{max-width:100%;padding:12px 14px 40px;}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px;}
  .grp{display:flex;gap:6px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:5px 8px;}
  .grp label{color:var(--muted);font-size:12px;}
  button{cursor:pointer;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:5px 10px;transition:.12s;}
  button:hover{border-color:var(--accent);color:var(--accent);}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  button.primary:hover{filter:brightness(1.07);color:#fff;}
  button.danger:hover{border-color:#c0392b;color:#c0392b;}
  select,input[type=text],input[type=date],input[type=number]{border:1px solid var(--line);border-radius:6px;padding:4px 6px;background:#fff;}
  select{min-width:180px;}
  .sync{font-size:12px;cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid var(--line);background:#fff;}
  .sync.ok{color:#2e7d32;border-color:#bfe0c2;} .sync.dirty{color:#b26a00;border-color:#f0d9a8;background:#fff8ec;} .sync.ro{color:#8a6d3b;} .sync.bad{color:#c0392b;border-color:#e6b0aa;}
  .meta{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px 16px;}
  .meta .f{display:flex;flex-direction:column;gap:3px;} .meta .f label{color:var(--muted);font-size:11px;} .meta .f input{width:100%;}
  .meta .title-f{grid-column:1/-1;} .meta .title-f input{font-size:16px;font-weight:700;}
  .board{position:relative;overflow:auto;max-height:68vh;border:1px solid var(--line);border-radius:8px;background:#fff;}
  .content{position:relative;}
  .overlay{position:absolute;pointer-events:none;z-index:0;} .vline{position:absolute;top:0;bottom:0;width:1px;background:var(--line2);}
  .row{display:flex;align-items:stretch;border-top:1px solid var(--line2);position:relative;}
  .row:nth-child(even) .lcells{background:#f8fafb;} .row:nth-child(even) .track{background:#fbfcfd;}
  .lcells{display:flex;align-items:center;position:sticky;left:0;z-index:2;background:#fff;border-right:1px solid var(--line);}
  .track{position:relative;z-index:1;}
  .row.head{position:sticky;top:0;z-index:6;border-top:none;} .row.head .lcells{z-index:7;background:var(--head);color:#fff;border-right:1px solid #2c3744;}
  .row.head .thead{background:#eef1f4;position:relative;}
  .lhcell{padding:6px 6px;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;text-align:center;}
  .c-id{width:38px;flex:0 0 38px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;}
  .c-name{width:216px;flex:0 0 216px;} .c-dur{width:70px;flex:0 0 70px;} .c-start{width:126px;flex:0 0 126px;} .c-finish{width:126px;flex:0 0 126px;}
  .c-crit{width:46px;flex:0 0 46px;display:flex;align-items:center;justify-content:center;} .c-act{width:44px;flex:0 0 44px;display:flex;align-items:center;justify-content:center;}
  .cell{padding:3px 5px;} .cell input{width:100%;border:1px solid transparent;background:transparent;padding:4px 5px;border-radius:5px;}
  .cell input:hover{border-color:var(--line);} .cell input:focus{border-color:var(--accent);background:#fff;outline:none;}
  .wd{font-size:10px;color:var(--muted);text-align:center;line-height:1;margin-top:1px;}
  .qlab{position:absolute;top:0;height:20px;line-height:20px;font-size:12px;font-weight:700;text-align:center;color:#2b3a4a;border-right:1px solid #9aa4b0;border-bottom:1px solid #9aa4b0;overflow:hidden;}
  .mlab{position:absolute;top:20px;height:20px;line-height:20px;font-size:11px;text-align:center;color:#4a5560;border-right:1px solid #cfd6dd;overflow:hidden;}
  .bar{position:absolute;top:8px;height:13px;background:#5b9bd5;border:1px solid #2e75b6;border-radius:2px;} .bar.crit{background:#ec7d74;border-color:#c0392b;}
  .blab{position:absolute;top:6px;font-size:11px;line-height:17px;white-space:nowrap;color:#333;}
  .ms{position:absolute;top:7px;width:13px;height:13px;background:#2f3b47;transform:rotate(45deg);} .ms.crit{background:#c0392b;}
  .mslab{position:absolute;top:6px;font-size:11px;line-height:17px;white-space:nowrap;color:#333;font-weight:600;}
  .today{position:absolute;top:0;bottom:0;width:2px;background:rgba(192,57,43,.55);z-index:3;}
  .foot{display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin-top:10px;color:#444;font-size:12px;}
  .lg{display:flex;gap:6px;align-items:center;} .sw{width:26px;height:11px;border-radius:2px;} .sw.task{background:#5b9bd5;border:1px solid #2e75b6;} .sw.crit{background:#ec7d74;border:1px solid #c0392b;} .sw.ms{width:12px;height:12px;background:#c0392b;transform:rotate(45deg);}
  .addbtn{margin-top:10px;} .hint{color:var(--muted);font-size:12px;margin-top:6px;line-height:1.6;}
  /* print view */
  #printView{display:none;}
  .pv{font-family:"Microsoft JhengHei","Noto Sans TC","Segoe UI",sans-serif;color:#1a1a1a;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .pv *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .pv .ptitle{font-size:15px;font-weight:700;margin:0 0 2px;} .pv .psub{font-size:9px;color:#555;margin:0 0 8px;}
  .pv .pgrid{display:flex;border:1px solid #6b6b6b;} .pv .pleft{border-right:1px solid #6b6b6b;} .pv .pright{position:relative;}
  .pv .phrow{display:flex;align-items:center;height:32px;background:#3c4a5a;color:#fff;font-size:9px;font-weight:700;} .pv .phrow>div{padding:0 4px;overflow:hidden;}
  .pv .p-id{width:30px;flex:0 0 30px;text-align:center;} .pv .p-name{width:150px;flex:0 0 150px;} .pv .p-dur{width:40px;flex:0 0 40px;text-align:center;} .pv .p-date{width:82px;flex:0 0 82px;text-align:center;}
  .pv .ptrow{display:flex;align-items:center;height:12px;font-size:7.2px;border-top:1px solid #e2e2e2;} .pv .ptrow>div{padding:0 4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;} .pv .pz{background:#e8edf2;}
  .pv .prhead{position:relative;height:32px;border-bottom:1px solid #6b6b6b;background:#eef1f4;}
  .pv .pql{position:absolute;top:0;height:15px;line-height:15px;font-size:8px;font-weight:700;text-align:center;border-right:1px solid #9aa4b0;border-bottom:1px solid #9aa4b0;color:#2b3a4a;overflow:hidden;}
  .pv .pml{position:absolute;top:15px;height:17px;line-height:17px;font-size:7.5px;text-align:center;border-right:1px solid #cfd6dd;color:#4a5560;overflow:hidden;}
  .pv .pchart{position:relative;} .pv .pvln{position:absolute;top:0;left:0;right:0;bottom:0;} .pv .pv1{position:absolute;top:0;bottom:0;width:1px;background:#e6e9ec;}
  .pv .pbrow{position:relative;height:12px;border-top:1px solid #eee;}
  .pv .pbar{position:absolute;top:2.5px;height:7px;background:#5b9bd5;border:1px solid #2e75b6;border-radius:1px;} .pv .pbar.crit{background:#ec7d74;border-color:#c0392b;}
  .pv .pbl{position:absolute;top:1px;font-size:6.8px;line-height:10px;white-space:nowrap;color:#333;}
  .pv .pms{position:absolute;top:2px;width:8px;height:8px;background:#2f3b47;transform:rotate(45deg);} .pv .pms.crit{background:#c0392b;}
  .pv .pmsl{position:absolute;top:1px;font-size:6.8px;line-height:10px;white-space:nowrap;color:#333;font-weight:600;}
  .pv .pleg{margin-top:8px;font-size:8px;color:#444;display:flex;gap:18px;align-items:center;} .pv .plg{display:flex;gap:5px;align-items:center;}
  .pv .psw{width:22px;height:8px;} .pv .psw.t{background:#5b9bd5;border:1px solid #2e75b6;} .pv .psw.c{background:#ec7d74;border:1px solid #c0392b;} .pv .psm{width:9px;height:9px;background:#c0392b;transform:rotate(45deg);}
  .pv .pfoot{margin-top:6px;font-size:8px;color:#666;}
  @media print{
    @page{size:A3 landscape;margin:8mm;}
    html,body{background:#fff !important;}
    .toolbar,.meta,.board,.addbtn,.foot,.hint,.no-print{display:none!important;}
    #printView{display:block!important;}
    .wrap{padding:0;}
    /* force browsers to print background colours (filled bars + zebra rows) even when "Background graphics" is off */
    *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
  }
</style>
</head>

  else { el.classList.add("ok"); el.textContent=L.syncOk; } }

function useData(d){ state=d; if(!state.activeId||!active())state.activeId=state.projects[0].id; dirty=false; cacheSave(); renderAll(); buildPrint(); badge(); }
function loadCloud(force){
  fetch(DATA_API+"?t="+Date.now(),{headers:ghHeaders()})
   .then(function(r){ if(r.status===401&&GH_TOKEN&&!tokenBad){ tokenBad=true; badge(); return null; }
     if(r.status===404){ dataSha=null; return {__seed:true}; } if(!r.ok)throw new Error("HTTP "+r.status); return r.json(); })
   .then(function(data){ if(!data)return;
     if(data.__seed){ useData(JSON.parse(JSON.stringify(SEED))); badge(); return; }
     dataSha=data.sha; var parsed=JSON.parse(b64dec(data.content));
     if(!force){ try{ var c=JSON.parse(localStorage.getItem(CACHE_KEY)||"null"); if(c&&c.dirty&&confirm(L.recoverLocal)){ state=c.data; dirty=true; renderAll(); buildPrint(); badge(); return; } }catch(e){} }
     useData(parsed); })
   .catch(function(){ /* offline: fall back to cache or seed */
     try{ var c=JSON.parse(localStorage.getItem(CACHE_KEY)||"null"); if(c&&c.data){ state=c.data; dirty=!!c.dirty; renderAll(); buildPrint(); badge(); return; } }catch(e){}
     useData(JSON.parse(JSON.stringify(SEED))); });
}
function saveCloud(isRetry){
  if(!GH_TOKEN||tokenBad){ setToken(); return; }
  setBadge(L.syncSaving,"dirty");
  var body={ message:"Update progress schedules ("+new Date().toISOString().slice(0,10)+")", content:b64enc(JSON.stringify(state,null,2)), branch:GH_BRANCH };
  if(dataSha)body.sha=dataSha;
  fetch(DATA_API,{method:"PUT",headers:ghHeaders({"Content-Type":"application/json"}),body:JSON.stringify(body)})
   .then(function(r){ if(r.status===401){ tokenBad=true; badge(); throw new Error("__t"); }
     if((r.status===409||r.status===422)&&!isRetry){ return fetch(DATA_API+"?t="+Date.now(),{headers:ghHeaders()}).then(function(x){return x.json();}).then(function(d){ dataSha=d.sha; return saveCloud(true); })&&null; }
     if(!r.ok)throw new Error("HTTP "+r.status); return r.json(); })
   .then(function(data){ if(!data)return; if(data.content&&data.content.sha)dataSha=data.content.sha; dirty=false; cacheSave(); setBadge(L.syncSaved,"ok"); setTimeout(badge,1500); })
   .catch(function(err){ if(String(err&&err.message)!=="__t")setBadge(L.syncFail,"bad"); });
}

  var today=new Date(); today.setHours(0,0,0,0); if(today>=axisStart&&today<=addDays(axisEnd,1)) o+="<div class='today' style='left:"+x(today)+"px'></div>"; ov.innerHTML=o;
  t.forEach(function(tk,i){ var tr=document.querySelector("[data-track='"+i+"']"); tr.style.width=chartW+"px"; var s=pISO(tk.start),f=pISO(tk.finish),h="";
    if(s){ if(isMs(tk)){ var xa=x(s); h="<div class='"+(tk.critical?"ms crit":"ms")+"' style='left:"+(xa-6)+"px'></div><div class='mslab' style='left:"+(xa+9)+"px'>"+esc(TN(tk))+"</div>"; }
      else if(f){ var xa2=x(s),xb=x(addDays(f,1)),w=Math.max(3,xb-xa2); h="<div class='"+(tk.critical?"bar crit":"bar")+"' style='left:"+xa2+"px;width:"+w+"px'></div><div class='blab' style='left:"+(xb+4)+"px'>"+esc(TN(tk))+"</div>"; } }
    tr.innerHTML=h;
    var ws=document.querySelector("[data-wd='s"+i+"']"); if(ws)ws.textContent=s?L.wdHint(s.getDay()):"";
    var wf=document.querySelector("[data-wd='f"+i+"']"); if(wf)wf.textContent=f?L.wdHint(f.getDay()):""; });
  document.getElementById("content").style.width=(LEFTW+chartW)+"px";
}
function buildPrint(){ var p=active(),t=p.tasks,m=p.meta||{},ax=computeAxis(t),axisStart=ax.axisStart,axisEnd=ax.axisEnd;
  var totalDays=Math.round((addDays(axisEnd,1)-axisStart)/86400000),labelW=30+150+40+82+82,chartW=Math.round(Math.min(1150,Math.max(700,1527-labelW)));
  var x=function(d){return Math.round((d-axisStart)/86400000/totalDays*chartW);};
  var months=monthsOf(axisStart,axisEnd),mH="",qH="",vH="";
  months.forEach(function(mo,i){ var xa=x(mo),nx=(i+1<months.length)?x(months[i+1]):chartW; mH+="<div class='pml' style='left:"+xa+"px;width:"+(nx-xa)+"px'>"+L.month(mo.getMonth())+"</div>"; vH+="<div class='pv1' style='left:"+xa+"px'></div>"; });
  quartersOf(months,x,chartW).forEach(function(q){ qH+="<div class='pql' style='left:"+q.x0+"px;width:"+(q.x1-q.x0)+"px'>"+q.label+"</div>"; });
  var pd=function(iso){ var d=pISO(iso); return d?L.pdate(d):""; };
  var tRows="",bRows=""; t.forEach(function(tk,i){ var z=(i%2)?" pz":"";
    tRows+="<div class='ptrow"+z+"'><div class='p-id'>"+(i+1)+"</div><div class='p-name' title='"+esc(TN(tk))+"'>"+esc(TN(tk))+"</div><div class='p-dur'>"+L.durUnit(Number(tk.durDays||0))+"</div><div class='p-date'>"+pd(tk.start)+"</div><div class='p-date'>"+pd(tk.finish)+"</div></div>";
    var s=pISO(tk.start),f=pISO(tk.finish),mk=""; if(s){ if(isMs(tk)){ var xa=x(s); mk="<div class='"+(tk.critical?"pms crit":"pms")+"' style='left:"+(xa-4)+"px'></div><div class='pmsl' style='left:"+(xa+7)+"px'>"+esc(TN(tk))+"</div>"; }
      else if(f){ var xa2=x(s),xb=x(addDays(f,1)),w=Math.max(2,xb-xa2); mk="<div class='"+(tk.critical?"pbar crit":"pbar")+"' style='left:"+xa2+"px;width:"+w+"px'></div><div class='pbl' style='left:"+(xb+3)+"px'>"+esc(TN(tk))+"</div>"; } }
    bRows+="<div class='pbrow"+z+"'>"+mk+"</div>"; });
  var sub=[]; if(m.code)sub.push(L.pSubCode+m.code); if(m.schedDate)sub.push(L.pSubDate+pd(m.schedDate)); if(m[noteKey()])sub.push(m[noteKey()]);
  document.getElementById("printView").innerHTML="<div class='pv'><div class='ptitle'>"+esc(p.name)+L.pTitleSuffix+"</div><div class='psub'>"+sub.map(esc).join("　·　")+"</div>"+
    "<div class='pgrid'><div class='pleft' style='width:"+labelW+"px;flex:0 0 "+labelW+"px'><div class='phrow'><div class='p-id'>"+L.colId+"</div><div class='p-name'>"+L.colName+"</div><div class='p-dur'>"+L.colDur+"</div><div class='p-date'>"+L.colStart+"</div><div class='p-date'>"+L.colFinish+"</div></div>"+tRows+"</div>"+
    "<div class='pright' style='width:"+chartW+"px'><div class='prhead'>"+qH+mH+"</div><div class='pchart'><div class='pvln'>"+vH+"</div>"+bRows+"</div></div></div>"+
    "<div class='pleg'><div class='plg'><span class='psw c'></span>"+L.legCrit+"</div><div class='plg'><span class='psw t'></span>"+L.legTask+"</div><div class='plg'><span class='psm'></span>"+L.legMsShort+"</div></div>"+
    "<div class='pfoot'>"+L.pFoot(esc(p.name),pd(m.schedDate))+"</div></div>";
}
function renderAll(){ applyStatic(); projOption(); renderMeta(); renderStructure(); }

/* ===== events ===== */
document.getElementById("board").addEventListener("input",function(e){ var el=e.target; if(el.dataset.f===undefined)return; var i=+el.dataset.i,tk=active().tasks[i];
  if(el.dataset.f==="critical")tk.critical=el.checked; else if(el.dataset.f==="durDays")tk.durDays=el.value===""?0:Number(el.value); else tk[el.dataset.f]=el.value;
  markDirty(); renderGantt(); });
document.getElementById("meta").addEventListener("input",function(e){ var el=e.target; if(el.dataset.meta===undefined)return; var p=active();
  if(el.dataset.meta==="name"){ p.name=el.value; projOption(); } else { p.meta=p.meta||{}; p.meta[el.dataset.meta]=el.value; } markDirty(); });
document.getElementById("board").addEventListener("click",function(e){ var d=e.target.dataset.del; if(d!==undefined){ active().tasks.splice(+d,1); markDirty(); renderStructure(); } });
document.getElementById("addRow").addEventListener("click",function(){ var p=active(),last=p.tasks[p.tasks.length-1],st=last?last.finish:fISO(new Date());
  p.tasks.push({name:LANGS.zh.newTaskName,nameEn:LANGS.en.newTaskName,durDays:1,start:st,finish:st,critical:false}); markDirty(); renderStructure();
  document.getElementById("board").scrollTop=document.getElementById("board").scrollHeight; });
document.getElementById("recalc").addEventListener("click",function(){ if(!confirm(L.confirmRecalc))return; active().tasks.forEach(function(tk){ var n=Number(tk.durDays); if(tk.start&&n>0)tk.finish=addWorkingDays(tk.start,n); }); markDirty(); renderStructure(); });
document.getElementById("zIn").addEventListener("click",function(){ pxPerDay=Math.min(20,pxPerDay+1); renderGantt(); });
document.getElementById("zOut").addEventListener("click",function(){ pxPerDay=Math.max(2,pxPerDay-1); renderGantt(); });
document.getElementById("print").addEventListener("click",function(){ buildPrint(); setTimeout(function(){window.print();},60); });
document.getElementById("langBtn").addEventListener("click",function(){ lang=(lang==="zh")?"en":"zh"; L=LANGS[lang]; try{localStorage.setItem("acg_gantt_lang",lang);}catch(e){} renderAll(); buildPrint(); badge(); });
document.getElementById("sync").addEventListener("click",setToken);
document.getElementById("cloudSave").addEventListener("click",function(){ saveCloud(false); });
document.getElementById("cloudReload").addEventListener("click",function(){ if(dirty&&!confirm(L.confirmReload))return; loadCloud(true); });
document.getElementById("projSel").addEventListener("change",function(e){ state.activeId=e.target.value; markDirty(); renderAll(); buildPrint(); });
document.getElementById("pNew").addEventListener("click",function(){ var name=prompt(L.promptNewProj,L.newProjName); if(!name)return; var today=fISO(new Date());
  state.projects.push({id:uid(),name:name,meta:{code:"",schedDate:today,note:"",noteEn:""},tasks:[{name:LANGS.zh.newTaskName,nameEn:LANGS.en.newTaskName,durDays:1,start:today,finish:today,critical:false}]});
  state.activeId=state.projects[state.projects.length-1].id; markDirty(); renderAll(); buildPrint(); });
document.getElementById("pRename").addEventListener("click",function(){ var p=active(),n=prompt(L.promptRename,p.name); if(n){ p.name=n; markDirty(); renderAll(); } });
document.getElementById("pDup").addEventListener("click",function(){ var c=JSON.parse(JSON.stringify(active())); c.id=uid(); c.name=active().name+L.copySuffix; state.projects.push(c); state.activeId=c.id; markDirty(); renderAll(); buildPrint(); });
document.getElementById("pDel").addEventListener("click",function(){ if(state.projects.length<=1){ alert(L.alertKeepOne); return; } var p=active(); if(!confirm(L.del+" \""+p.name+"\" ?"))return; state.projects=state.projects.filter(function(x){return x.id!==p.id;}); state.activeId=state.projects[0].id; markDirty(); renderAll(); buildPrint(); });
document.getElementById("expJson").addEventListener("click",function(){ var b=new Blob([JSON.stringify(state,null,2)],{type:"application/json"}); var a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="progress-schedules-"+fISO(new Date())+".json"; a.click(); });
document.getElementById("impJson").addEventListener("click",function(){ document.getElementById("fileIn").click(); });
document.getElementById("fileIn").addEventListener("change",function(e){ var file=e.target.files[0]; if(!file)return; var r=new FileReader();
  r.onload=function(){ try{ var d=JSON.parse(r.result); if(!d.projects||!d.projects.length)throw 0; if(!confirm(L.confirmImport))return; state=d; if(!state.activeId||!active())state.activeId=state.projects[0].id; markDirty(); renderAll(); buildPrint(); }catch(err){ alert(L.importErr); } };
  r.readAsText(file); e.target.value=""; });
window.addEventListener("beforeunload",function(e){ if(dirty){ e.preventDefault(); e.returnValue=L.dirtyWarn; return L.dirtyWarn; } });

/* ===== init ===== */
applyStatic();
try{ var c=JSON.parse(localStorage.getItem(CACHE_KEY)||"null"); if(c&&c.data){ state=c.data; dirty=!!c.dirty; if(!state.activeId||!active())state.activeId=state.projects[0].id; renderAll(); buildPrint(); } }catch(e){}
if(!state){ state=JSON.parse(JSON.stringify(SEED)); state.activeId=state.projects[0].id; renderAll(); buildPrint(); }
badge();
loadCloud(false);
</script>
</body>
</html>
